general {
  disable_loading_bar = true
  hide_cursor = true
}

background {
  monitor =
  color = rgba(20, 20, 20, 1.0)
}

input-field {
  monitor =
  size = 250, 60
  position = 0, -80
  dots_center = true
  fade_on_empty = true
  font_color = rgba(200, 200, 200, 1.0)
  inner_color = rgba(50, 50, 50, 1.0)
  outer_color = rgba(100, 100, 100, 1.0)
  outline_thickness = 2
  shadow_passes = 1
}

label {
  monitor =
  text = cmd[update:60000] date +"%H:%M"
  font_size = 72
  color = rgba(220, 220, 220, 1.0)
  position = 0, 120
  halign = center
  valign = center
}

label {
  monitor =
  text = cmd[update:60000] date +"%A, %d %B"
  font_size = 24
  color = rgba(180, 180, 180, 1.0)
  position = 0, 40
  halign = center
  valign = center
}

