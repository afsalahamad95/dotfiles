general {
  disable_loading_bar = true
  hide_cursor = true
  grace = 0
}

# The Background: Blurred live screenshot of your workspace
background {
  monitor =
  path = screenshot
  blur_passes = 3
  blur_size = 8
  noise = 0.02
  contrast = 0.9
  brightness = 0.8
  vibrancy = 0.2
  vibrancy_darkness = 0.0
}

# The Password Input: Glowing glassmorphism pill
input-field {
  monitor =
  size = 250, 50
  position = 0, -100
  halign = center
  valign = center

  dots_center = true
  fade_on_empty = false
  
  # Cyberpunk styling
  font_color = rgb(205, 214, 244)
  inner_color = rgba(30, 30, 46, 0.8)
  outer_color = rgba(137, 180, 250, 0.8) # Neon blue glow
  outline_thickness = 2
  shadow_passes = 2
  shadow_size = 5
  shadow_color = rgba(137, 180, 250, 0.5)

  placeholder_text = <i><span foreground="##a6adc8">Access Terminal...</span></i>
}

# The Time: Massive neon clock
label {
  monitor =
  text = cmd[update:1000] echo "$(date +"%H:%M")"
  color = rgba(137, 180, 250, 1.0)
  font_size = 90
  font_family = JetBrainsMono Nerd Font Bold
  position = 0, 150
  halign = center
  valign = center
  shadow_passes = 2
  shadow_size = 10
  shadow_color = rgba(137, 180, 250, 0.4)
}

# The Date: Subtitle
label {
  monitor =
  text = cmd[update:1000] echo "$(date +"%A, %d %B %Y")"
  color = rgba(205, 214, 244, 0.8)
  font_size = 20
  font_family = JetBrainsMono Nerd Font
  position = 0, 50
  halign = center
  valign = center
}
